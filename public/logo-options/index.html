<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logo Options</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 30px; }
    p { margin: 0 0 20px; color: #475569; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; }
    .card img { width: 100%; height: auto; border-radius: 10px; background: #f1f5f9; }
    .name { margin-top: 10px; font-size: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>App Logo Options</h1>
    <p>Pick one and I can refine color, typography, and icon details.</p>
    <div class="grid">
      <div class="card"><img src="./bolt-tag.svg" alt="Bolt Tag" /><div class="name">1. Bolt Tag</div></div>
      <div class="card"><img src="./sms-badge.svg" alt="SMS Badge" /><div class="name">2. SMS Badge</div></div>
      <div class="card"><img src="./hvac-shield.svg" alt="HVAC Shield" /><div class="name">3. HVAC Shield</div></div>
      <div class="card"><img src="./stacked-sde.svg" alt="Stacked SDE" /><div class="name">4. Stacked SDE</div></div>
      <div class="card"><img src="./discount-dial.svg" alt="Discount Dial" /><div class="name">5. Discount Dial</div></div>
      <div class="card"><img src="./airflow-mark.svg" alt="Airflow Mark" /><div class="name">6. Airflow Mark</div></div>
    </div>
  </div>
</body>
</html>
