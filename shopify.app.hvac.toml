# Config for HVACSupplies store app
# Replace HVAC_APP_CLIENT_ID with the actual client_id from your Shopify Dev Dashboard

client_id = "0ac64a592cd30248522a0bf35cbd4e87"
name = "Smart Discount Engine 2"
application_url = "https://custom-app-shopify-discount-engine-hvac.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "read_customers,read_discounts,write_discounts,read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://custom-app-shopify-discount-engine-hvac.onrender.com/auth/callback"
]

[app_proxy]
url = "https://custom-app-shopify-discount-engine-hvac.onrender.com/proxy"
subpath = "discount-progress"
prefix = "apps"

[app_preferences]
url = "https://custom-app-shopify-discount-engine-hvac.onrender.com/app"
