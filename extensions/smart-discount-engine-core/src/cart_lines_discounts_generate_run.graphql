query Input {
  cart {
    buyerIdentity {
      customer {
        numberOfOrders
        vipTags: hasTags(
          tags: [
            "VIP3"
            "VIP4"
            "VIP5"
            "VIP6"
            "VIP7"
            "VIP8"
            "VIP9"
            "VIP10"
            "VIP11"
            "VIP12"
            "VIP13"
            "VIP14"
            "VIP15"
            "VIP16"
            "VIP17"
            "VIP18"
            "VIP19"
            "VIP20"
            "VIP21"
            "VIP22"
            "VIP23"
            "VIP24"
            "VIP25"
          ]
        ) {
          hasTag
          tag
        }
      }
    }
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          sku
          product {
            id
            discountPercent: metafield(
              namespace: "smart_discount_engine"
              key: "discount_percent"
            ) {
              value
            }
          }
        }
      }
    }
  }
  shop {
    runtimeConfig: metafield(namespace: "smart_discount_engine", key: "config") {
      value
    }
    hvacConfig: metafield(namespace: "smart_discount_engine", key: "hvac_config") {
      value
    }
  }
}
